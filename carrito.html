<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi carrito — Aromaz Perfum Shop</title>
  <meta name="description" content="Tu selección de fragancias en Aromaz. Finalizá tu compra por WhatsApp.">
  <meta name="robots" content="noindex,follow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/promos.css">
  <link rel="icon" type="image/jpeg" href="images/logo/aromaz-instagram.jpg">
</head>
<body>
  <div id="layout-header"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <span class="eyebrow">Tu selección</span>
        <h1>Mi <em>carrito</em></h1>
        <p>Revisá tus fragancias favoritas y finalizá la compra por WhatsApp.</p>
      </div>
    </section>

    <div class="container">
      <div class="breadcrumb">
        <a href="index.html">Inicio</a>
        <span class="separator">/</span>
        <span>Mi carrito</span>
      </div>
    </div>

    <section class="container">
      <div class="cart-layout" data-cart-layout>
        <div class="spinner" style="grid-column:1/-1"></div>
      </div>
    </section>
  </main>

  <div id="layout-footer"></div>

  <script src="js/config.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/whatsapp.js"></script>
  <script src="js/products.js"></script>
  <script src="js/promos.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/main.js"></script>

  <script>
    AROMAZ.layout.render({
      activeNav: '',
      title: 'Mi carrito — Aromaz Perfum Shop',
      description: 'Revisá tu carrito y finalizá la compra por WhatsApp.',
      path: '/carrito'
    });

    function render() {
      const layout = document.querySelector('[data-cart-layout]');
      const items = AROMAZ.cart.load();
      if (items.length === 0) {
        layout.innerHTML = `
          <div class="cart-empty">
            <i class="fas fa-cart-shopping"></i>
            <h2>Tu carrito está vacío</h2>
            <p>Descubrí nuestras fragancias y agregá tus favoritas.</p>
            <a href="catalogo.html" class="btn btn-primary btn-lg">
              <i class="fas fa-compass"></i> Explorar catálogo
            </a>
          </div>
        `;
        return;
      }

      const subtotal = AROMAZ.cart.total();
      const envioGratis = subtotal >= AROMAZ.envioGratisDesde;
      const faltaEnvioGratis = envioGratis ? 0 : AROMAZ.envioGratisDesde - subtotal;

      // Pre-cargar cupón si veníamos de una landing de promo
      const activePromo = AROMAZ.promos?.getActive?.();
      if (activePromo && !sessionStorage.getItem('aromaz-coupon')) {
        sessionStorage.setItem('aromaz-coupon', activePromo.code);
      }
      const coupon = sessionStorage.getItem('aromaz-coupon') || '';
      const promoInfo = AROMAZ.promos?.list.find(p => p.code === coupon);
      // Sólo TRANSF10 / BIENVENIDO10 aplican descuento inmediato; los cupones de campañas se informan al operador.
      const discount = (coupon === 'TRANSF10' || coupon === 'BIENVENIDO10') ? Math.round(subtotal * 0.1) : 0;
      const total = subtotal - discount;

      layout.innerHTML = `
        <div class="cart-items">
          ${items.map(it => `
            <div class="cart-item" data-sku="${it.skuVariante}">
              <div class="cart-item-image">
                <img src="${it.imagen}" alt="${it.nombre}" loading="lazy">
              </div>
              <div class="cart-item-info">
                <h4><a href="producto.html?p=${encodeURIComponent(it.slug || '')}">${it.nombre}</a></h4>
                <div class="sub">
                  ${it.tamanio}${it.equivalencia ? ' · <em>' + it.equivalencia + '</em>' : ''}
                </div>
                <div class="cart-item-actions">
                  <div class="cart-item-qty">
                    <button data-qty="-1" data-sku="${it.skuVariante}" aria-label="Quitar uno">−</button>
                    <span>${it.cantidad}</span>
                    <button data-qty="+1" data-sku="${it.skuVariante}" aria-label="Agregar uno">+</button>
                  </div>
                  <button class="cart-item-remove" data-remove="${it.skuVariante}">
                    <i class="fas fa-trash"></i> Quitar
                  </button>
                </div>
              </div>
              <div class="cart-item-price">
                <div class="price">${AROMAZ.formatMoney(it.precio * it.cantidad)}</div>
                ${it.cantidad > 1 ? `<div class="unit-price">${AROMAZ.formatMoney(it.precio)} c/u</div>` : ''}
              </div>
            </div>
          `).join('')}
          <div style="margin-top: var(--sp-5); display:flex; justify-content: space-between; align-items:center; flex-wrap:wrap; gap: var(--sp-3);">
            <a href="catalogo.html" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i> Seguir comprando</a>
            <button class="btn-clear-filters" data-clear-cart>Vaciar carrito</button>
          </div>
        </div>

        <aside class="cart-summary">
          <h3>Resumen de compra</h3>
          ${faltaEnvioGratis > 0 ? `
            <div style="padding: var(--sp-3); background: rgba(201,163,90,0.1); border-radius: var(--radius-sm); margin-bottom: var(--sp-4); font-size: var(--fs-sm);">
              <i class="fas fa-truck" style="color: var(--c-gold)"></i>
              Agregá <strong>${AROMAZ.formatMoney(faltaEnvioGratis)}</strong> más y ¡el envío es <strong>gratis</strong>!
            </div>
          ` : `
            <div style="padding: var(--sp-3); background: rgba(34,197,94,0.1); border-radius: var(--radius-sm); margin-bottom: var(--sp-4); font-size: var(--fs-sm); color: var(--c-success); font-weight: 600;">
              <i class="fas fa-check-circle"></i> ¡Envío gratis a todo el país!
            </div>
          `}

          <div class="summary-row">
            <span>Subtotal (${AROMAZ.cart.count()} productos)</span>
            <span>${AROMAZ.formatMoney(subtotal)}</span>
          </div>
          ${discount > 0 ? `
            <div class="summary-row" style="color: var(--c-success);">
              <span>Descuento transferencia (10%)</span>
              <span>−${AROMAZ.formatMoney(discount)}</span>
            </div>
          ` : ''}
          <div class="summary-row">
            <span>Envío</span>
            <span>${envioGratis ? '<strong style="color:var(--c-success)">GRATIS</strong>' : 'A coordinar'}</span>
          </div>

          <div class="coupon-field">
            <input type="text" placeholder="Código de cupón" id="couponInput" value="${coupon}">
            <button class="btn btn-dark btn-sm" data-apply-coupon>Aplicar</button>
          </div>
          ${promoInfo ? `
            <div style="margin-top:-4px; margin-bottom: var(--sp-3); padding: var(--sp-2) var(--sp-3); background: rgba(201,163,90,0.08); border-radius: var(--radius-sm); font-size: var(--fs-xs); color: var(--c-gray-700); border-left: 2px solid var(--c-gold);">
              <i class="fas fa-tag" style="color: var(--c-gold);"></i>
              Promo aplicada: <strong>${promoInfo.title}</strong> — se informará en WhatsApp.
            </div>
          ` : ''}

          <div class="shipping-calc">
            <label>Código postal (opcional)</label>
            <div class="row">
              <input type="text" placeholder="CP" id="cpInput" value="${sessionStorage.getItem('aromaz-cp') || ''}">
              <button class="btn btn-outline btn-sm" data-save-cp>OK</button>
            </div>
          </div>

          <div class="summary-row total">
            <span>Total</span>
            <span class="amount">${AROMAZ.formatMoney(total)}</span>
          </div>

          <button class="btn btn-whatsapp btn-lg btn-block" data-checkout style="margin-top: var(--sp-4);">
            <i class="fab fa-whatsapp"></i> Finalizar por WhatsApp
          </button>
          <p style="text-align: center; font-size: var(--fs-xs); color: var(--c-gray-600); margin-top: var(--sp-3);">
            <i class="fas fa-lock"></i> Compra segura · Atención personalizada
          </p>

          <div style="margin-top: var(--sp-5); padding-top: var(--sp-4); border-top: 1px solid var(--c-gray-100); font-size: var(--fs-xs); color: var(--c-gray-600);">
            <strong style="display: block; color: var(--c-black); margin-bottom: var(--sp-2);">Medios de pago</strong>
            <div style="display: flex; gap: var(--sp-3); align-items: center; flex-wrap: wrap;">
              <span><i class="fas fa-money-bill-transfer" style="color: var(--c-gold);"></i> Transferencia (10% OFF)</span>
              <span><i class="fas fa-credit-card" style="color: var(--c-gold);"></i> MercadoPago</span>
              <span><i class="fas fa-money-bill-wave" style="color: var(--c-gold);"></i> Efectivo</span>
            </div>
          </div>
        </aside>
      `;
    }

    render();

    document.addEventListener('click', (e) => {
      const qty = e.target.closest('[data-qty]');
      if (qty) {
        const sku = qty.dataset.sku;
        const delta = parseInt(qty.dataset.qty, 10);
        const item = AROMAZ.cart.load().find(i => i.skuVariante === sku);
        if (item) {
          const newQty = Math.max(0, item.cantidad + delta);
          if (newQty === 0) AROMAZ.cart.remove(sku);
          else AROMAZ.cart.updateQty(sku, newQty);
          render();
        }
        return;
      }
      const rem = e.target.closest('[data-remove]');
      if (rem) {
        AROMAZ.cart.remove(rem.dataset.remove);
        render();
        return;
      }
      if (e.target.closest('[data-clear-cart]')) {
        if (confirm('¿Seguro querés vaciar el carrito?')) {
          AROMAZ.cart.clear();
          render();
        }
        return;
      }
      if (e.target.closest('[data-apply-coupon]')) {
        const v = document.getElementById('couponInput').value.trim().toUpperCase();
        const validPromo = AROMAZ.promos?.list.find(p => p.code === v);
        if (v === 'TRANSF10' || v === 'BIENVENIDO10') {
          sessionStorage.setItem('aromaz-coupon', v);
          AROMAZ.toast('Cupón aplicado: 10% OFF', 'success');
        } else if (validPromo) {
          sessionStorage.setItem('aromaz-coupon', v);
          AROMAZ.promos.setActive(validPromo.id);
          AROMAZ.toast(`Promo ${validPromo.title} aplicada`, 'success');
        } else if (!v) {
          sessionStorage.removeItem('aromaz-coupon');
          AROMAZ.promos?.clearActive?.();
          AROMAZ.toast('Cupón quitado');
        } else {
          AROMAZ.toast('Cupón inválido', 'error');
          return;
        }
        render();
      }
      if (e.target.closest('[data-save-cp]')) {
        const cp = document.getElementById('cpInput').value.trim();
        if (cp) sessionStorage.setItem('aromaz-cp', cp);
        else sessionStorage.removeItem('aromaz-cp');
        AROMAZ.toast('Código postal guardado', 'success');
      }
      if (e.target.closest('[data-checkout]')) {
        const items = AROMAZ.cart.load();
        if (!items.length) { AROMAZ.toast('Tu carrito está vacío', 'error'); return; }
        const cp = document.getElementById('cpInput')?.value?.trim() || '';
        const promoCode = sessionStorage.getItem('aromaz-coupon') || '';
        AROMAZ.wa.openCheckout(items, AROMAZ.cart.total(), cp, promoCode);
      }
    });
  </script>
</body>
</html>
