[build]
  publish = "."

# Redirecciones amigables para URLs limpias
[[redirects]]
  from = "/producto/:slug"
  to = "/producto.html?p=:slug"
  status = 200

[[redirects]]
  from = "/catalogo/:categoria"
  to = "/catalogo.html?categoria=:categoria"
  status = 200

